<!DOCTYPE html>
<html lang="zh-CN" style="font-family: 'SimHei', '黑体', 'PingFang SC', 'Microsoft YaHei', sans-serif !important;">
<head>
<script>(function(){var t=localStorage.getItem("theme");if(t==="dark"){document.documentElement.classList.add("dark");}else if(t==="light"){document.documentElement.classList.remove("dark");}else if(window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches){document.documentElement.classList.add("dark");}if(document.referrer&&document.referrer.indexOf(window.location.origin)===0){document.documentElement.classList.add("page-entering");}})();</script><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>店铺信息编辑</title><link rel="stylesheet" href="/static/css/style.css"></head>
<body class="merchant-page" data-merchant-id="{{ merchant.id }}">
    {% include "partials/merchant_sidebar.html" %}
    <main class="merchant-main">
        <h1>店铺信息编辑</h1>
        <section class="merchant-panel">
            <h2>图片管理</h2>
            <div class="upload-row">
                <div class="upload-box">▧<span>上传店铺封面</span><small>建议尺寸 1200×400px</small></div>
                <div class="upload-box small">▣<span>上传形象照片</span><small>建议尺寸 600×600px</small></div>
            </div>
        </section>
        <section class="merchant-panel">
            <h2>基础信息</h2>
            <div class="form-group">
                <label for="store-name">店铺名称</label>
                <input id="store-name" value="{{ merchant.name }}">
            </div>
            <div class="form-group">
                <label for="store-category">店铺分类</label>
                <select id="store-category">
                    <option value="餐饮" {% if merchant.category == '餐饮' %}selected{% endif %}>餐饮</option>
                    <option value="咖啡" {% if merchant.category == '咖啡' %}selected{% endif %}>咖啡</option>
                    <option value="茶饮" {% if merchant.category == '茶饮' %}selected{% endif %}>茶饮</option>
                    <option value="甜品" {% if merchant.category == '甜品' %}selected{% endif %}>甜品</option>
                    <option value="生活服务" {% if merchant.category == '生活服务' %}selected{% endif %}>生活服务</option>
                    <option value="其他" {% if merchant.category == '其他' %}selected{% endif %}>其他</option>
                </select>
            </div>
            <div class="form-group">
                <label for="store-slogan">店铺简介</label>
                <textarea id="store-slogan" rows="4">{{ merchant.slogan }}</textarea>
            </div>
            <div class="form-group">
                <label for="store-hours">经营时间</label>
                <input id="store-hours" value="{{ merchant.hours }}" placeholder="例如：08:00 - 22:00">
            </div>
            <div class="form-group">
                <label for="store-address">店铺地址</label>
                <input id="store-address" value="{{ merchant.address }}" placeholder="例如：北京市海淀区中关村大街1号">
            </div>
        </section>
        <div class="form-actions"><button class="soft-button">撤销修改</button><button class="primary-action">保存修改</button></div>
    </main>
<script src="/static/js/admin_store.js"></script>
    <script src="/static/js/page_transition.js"></script>
</body>
</html>
