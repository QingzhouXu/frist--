<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史咨询记录</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .history-layout {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .history-header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .history-header h1 {
            color: #2c3e50;
            margin: 0 0 10px 0;
            font-size: 28px;
        }
        
        .history-header p {
            color: #7f8c8d;
            margin: 0;
        }
        
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
        }
        
        .filter-select {
            padding: 10px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            background: white;
            cursor: pointer;
        }
        
        .search-input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            background: white;
        }
        
        .history-list {
            display: grid;
            gap: 20px;
        }
        
        .history-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        
        .history-card:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }
        
        .history-info {
            flex: 1;
        }
        
        .history-header-card {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .merchant-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 15px;
            object-fit: cover;
        }
        
        .history-details h3 {
            color: #2c3e50;
            margin: 0 0 8px 0;
            font-size: 18px;
        }
        
        .history-details p {
            color: #7f8c8d;
            margin: 0;
            font-size: 14px;
        }
        
        .history-meta {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #95a5a6;
            margin-top: 10px;
        }
        
        .history-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .view-btn {
            background: #3498db;
            color: white;
        }
        
        .view-btn:hover {
            background: #2980b9;
        }
        
        .delete-btn {
            background: #dc3545;
            color: white;
        }
        
        .delete-btn:hover {
            background: #c82333;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7f8c8d;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .history-card {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .history-actions {
                margin-top: 15px;
                width: 100%;
                justify-content: flex-end;
            }
            
            .filter-bar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body class="client-page">
    {% include "partials/client_nav.html" %}
    <main class="history-layout">
        <header class="history-header">
            <h1>📜 历史咨询记录</h1>
            <p>查看您与各个商家的咨询历史记录</p>
        </header>
        
        <div class="filter-bar">
            <select class="filter-select" id="merchant-filter">
                <option value="all">全部商家</option>
            </select>
            <input type="text" class="search-input" id="search-input" placeholder="搜索咨询内容...">
        </div>
        
        <section class="history-list" id="history-list">
            <div class="empty-state">
                <div class="empty-state-icon">💬</div>
                <h3>暂无咨询记录</h3>
                <p>当您与商家咨询后，历史记录会显示在这里</p>
                <a href="/" class="primary-action">去首页浏览商家</a>
            </div>
        </section>
    </main>
    <script src="/static/js/history.js"></script>
</body>
</html>
